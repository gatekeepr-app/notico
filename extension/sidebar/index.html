<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notico</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fafafa;
        color: #1d1d1f;
        font-size: 14px;
      }
      .container { padding: 12px; display: flex; flex-direction: column; min-height: 100vh; }
      h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
      .kb-hint {
        font-size: 10px;
        color: #86868b;
        margin-bottom: 8px;
        text-align: center;
      }
      textarea {
        width: 100%;
        min-height: 80px;
        border: 1px solid #e5e5ea;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
        font-family: "SF Mono", "Fira Code", monospace;
        resize: vertical;
        outline: none;
      }
      textarea:focus { border-color: #5e6ad2; }
      .btn {
        margin-top: 8px;
        background: #5e6ad2;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
      }
      .btn:hover { background: #4c5ab5; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .btn-secondary {
        margin-top: 8px;
        background: transparent;
        color: #5e6ad2;
        border: 1px solid #e5e5ea;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 11px;
        cursor: pointer;
        width: 100%;
      }
      .note-list { margin-top: 12px; flex: 1; overflow-y: auto; }
      .note-item {
        padding: 8px;
        border: 1px solid #e5e5ea;
        border-radius: 8px;
        margin-bottom: 6px;
        background: white;
      }
      .note-item h3 { font-size: 13px; font-weight: 500; }
      .note-item p { font-size: 11px; color: #86868b; margin-top: 2px; }
      .tag {
        display: inline-block;
        font-size: 10px;
        background: #eef0fa;
        color: #5e6ad2;
        padding: 1px 6px;
        border-radius: 4px;
        margin-top: 4px;
        margin-right: 2px;
      }
      .status { font-size: 11px; color: #86868b; margin-top: 6px; }
      .config { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e5ea; }
      .config input {
        width: 100%;
        border: 1px solid #e5e5ea;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 11px;
        outline: none;
        margin-top: 4px;
      }
      .config input:focus { border-color: #5e6ad2; }
      .config label { font-size: 11px; font-weight: 500; color: #86868b; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Notico</h1>
      <div class="kb-hint">Cmd+Shift+N to clip from any page</div>
      <textarea id="note-input" placeholder="Quick note..."></textarea>
      <button class="btn" id="save-btn">Save Note</button>
      <div class="status" id="status"></div>
      <div class="note-list" id="note-list"></div>

      <div class="config">
        <label>Convex Deployment URL</label>
        <input type="url" id="convex-url" placeholder="https://your-project.convex.cloud" />
        <button class="btn-secondary" id="save-config-btn">Save URL</button>
        <div class="status" id="config-status"></div>
      </div>
    </div>
    <script>
      async function sendMessage(msg) {
        return new Promise((resolve, reject) => {
          chrome.runtime.sendMessage(msg, (response) => {
            if (chrome.runtime.lastError) {
              reject(new Error(chrome.runtime.lastError.message));
            } else {
              resolve(response);
            }
          });
        });
      }

      async function getCurrentTabInfo() {
        try {
          const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
          if (tab?.url && !tab.url.startsWith("chrome://") && !tab.url.startsWith("about:")) {
            const { id, url, title } = tab;
            // Try to get selected text from the page
            try {
              const results = await chrome.scripting.executeScript({
                target: { tabId: id },
                func: () => window.getSelection()?.toString().trim() || "",
              });
              const selection = results?.[0]?.result || "";
              return { url, title, selection };
            } catch {
              return { url, title, selection: "" };
            }
          }
        } catch {}
        return null;
      }

      async function loadNotes() {
        try {
          const res = await sendMessage({ type: "GET_NOTES" });
          if (res.success) {
            renderNotes(res.notes);
          }
        } catch (e) {
          document.getElementById("status").textContent = "Could not load notes";
        }
      }

      function renderNotes(notes) {
        const list = document.getElementById("note-list");
        list.innerHTML = notes.slice(0, 10).map(n =>
          `<div class="note-item">
            <h3>${n.title || "Untitled"}</h3>
            <p>${(n.content || "").replace(/[#*[\]>]/g, "").slice(0, 60)}</p>
            ${n.tags && n.tags.length ? n.tags.map(t => `<span class="tag">${t}</span>`).join("") : ""}
          </div>`
        ).join("");
      }

      document.getElementById("save-btn").onclick = async () => {
        const input = document.getElementById("note-input");
        const content = input.value.trim();
        if (!content) return;
        const btn = document.getElementById("save-btn");
        btn.disabled = true;
        btn.textContent = "Saving...";
        try {
          const title = content.split("\n")[0].replace(/^#\s*/, "").slice(0, 40) || "Quick note";
          const res = await sendMessage({ type: "SAVE_QUICK_NOTE", title, content });
          if (res.success) {
            input.value = "";
            document.getElementById("status").textContent = "Saved!";
            loadNotes();
          } else {
            document.getElementById("status").textContent = "Failed: " + (res.error || "unknown");
          }
        } catch (e) {
          document.getElementById("status").textContent = "Error: " + e.message;
        }
        btn.disabled = false;
        btn.textContent = "Save Note";
      };

      document.getElementById("save-config-btn").onclick = async () => {
        const url = document.getElementById("convex-url").value.trim();
        if (!url) return;
        try {
          const res = await sendMessage({ type: "SET_CONVEX_URL", url });
          document.getElementById("config-status").textContent = res.success ? "URL saved!" : "Failed: " + (res.error || "unknown");
        } catch (e) {
          document.getElementById("config-status").textContent = "Error: " + e.message;
        }
      };

      (async () => {
        try {
          const res = await sendMessage({ type: "GET_CONVEX_URL" });
          if (res.success) {
            document.getElementById("convex-url").value = res.url;
          }
        } catch {}
        loadNotes();

        // Pre-fill with current page context
        const tabInfo = await getCurrentTabInfo();
        if (tabInfo) {
          const input = document.getElementById("note-input");
          const preamble = `# [${tabInfo.title}](${tabInfo.url})\n\n`;
          if (tabInfo.selection) {
            input.value = preamble + `> ${tabInfo.selection}\n\n`;
          } else {
            input.value = preamble;
          }
          input.focus();
          // Move cursor to end
          input.setSelectionRange(input.value.length, input.value.length);
        }
      })();
    </script>
  </body>
</html>
